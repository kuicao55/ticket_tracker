name: rs

on:
  push:
    branches: [main]
    paths:
      - 'rs/**'
      - '.github/workflows/rs.yml'
  pull_request:
    paths:
      - 'rs/**'
      - '.github/workflows/rs.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rs/Cargo.lock') }}
      - name: Clippy
        run: cargo clippy --manifest-path rs/Cargo.toml --all-targets -- -D warnings
      - name: Test
        run: cargo test --manifest-path rs/Cargo.toml --locked
      - name: Build
        run: cargo build --manifest-path rs/Cargo.toml --release --locked
      - name: Smoke (--version)
        run: ./rs/target/release/tt --version
      - name: Smoke (--help)
        run: ./rs/target/release/tt --help
