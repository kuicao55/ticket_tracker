name: py (maintenance)

on:
  push:
    branches: [main]
    paths:
      - 'py/**'
      - '.github/workflows/py.yml'
  pull_request:
    paths:
      - 'py/**'
      - '.github/workflows/py.yml'

jobs:
  install:
    name: smoke (pip install ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ./py
      - name: Version + doctor
        run: |
          tt --version
          tt doctor
